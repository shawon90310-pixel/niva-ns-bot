<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIVA + NS BUYER ZONE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <div id="step1" class="page active">
            <h2 style="text-align: center; color: white; margin-bottom: 20px;">Coin Market</h2>
            
            <div class="coin-card" onclick="openSellForm('Niva Coin', 🛑, 20000, 'niva_buyer_zone_1')">
                <h3>Niva Coin Close 🛑🛑</h3>
                <p>Rate: 🛑৳ (🛑k) • Min: 🛑 Close 🛑</p>
            </div>

            <div style="margin-top: 25px; cursor: pointer;" onclick="openSellForm('Ns coin', 11, 10,000, 'ns_buy_user')">
                <h3 style="color: white; margin-bottom: 5px; margin-left: 5px;">Ns coin</h3>
                <p style="color: #94a3b8; font-size: 12px; margin-bottom: 10px; margin-left: 5px;">LIVE MARKET RATE</p>
                
                <div style="background-color: #1e3a8a; color: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 10px;">
                    <div style="font-size: 14px; opacity: 0.8;">User Rate</div>
                    <div style="font-size: 18px; font-weight: bold;">11৳</div>
                </div>

                <div style="background-color: #1e3a8a; color: white; padding: 15px; border-radius: 15px; text-align: center;">
                    <div style="font-size: 14px; opacity: 0.8;">Admin Rate</div>
                    <div style="font-size: 18px; font-weight: bold;">11.2৳</div>
                </div>
                <p style="color: #94a3b8; font-size: 12px; margin-top: 10px; text-align: center;">Min Submit: 10,000</p>
            </div>
        </div>

        <div id="step2" class="page">
            <h2 id="formTitle">Sell</h2>
            <div class="copy-box" style="background: #1e293b; padding: 10px; border-radius: 10px; text-align: center;">
                <p style="color: white;">Send to ID: <b id="copyTargetId" style="color: #3b82f6;">ns_buy_username</b></p>
                <button onclick="copyId()" style="background: #3b82f6; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px;">COPY ID</button>
            </div>
            
            <input type="number" id="coinAmount" placeholder="Enter amount" style="width: 100%; margin-top: 20px; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
            
            <input type="text" id="senderUsername" placeholder="Sender Username" style="width: 100%; margin-top: 12px; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
            
            <select id="paymentMethod" style="width: 100%; margin-top: 12px; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
                <option value="Bkash">Bkash</option>
                <option value="Nagad">Nagad</option>
                <option value="Rocket">Rocket</option>
            </select>
            
            <input type="text" id="walletNumber" placeholder="Payment Number" style="width: 100%; margin-top: 12px; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
            
            <button class="main-btn" onclick="showReview()" style="width: 100%; margin-top: 20px; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">Next Step →</button>
            <p onclick="goBack(1)" style="text-align: center; margin-top: 15px; cursor: pointer; color: #94a3b8;">Back to Home</p>
        </div>

        <div id="step3" class="page">
            <h2 style="color: white; text-align: center;">Review Order</h2>
            <div style="background: #1e293b; padding: 20px; border-radius: 12px; line-height: 2;">
                <p style="color: white;">Coin: <span id="revCoin" style="float: right; font-weight: bold;"></span></p>
                <p style="color: white;">Amount: <span id="revAmount" style="float: right; font-weight: bold;"></span></p>
                <p style="color: white;">Sender: <span id="revSender" style="float: right; font-weight: bold;"></span></p>
                <p style="color: white;">Method: <span id="revMethod" style="float: right; font-weight: bold;"></span></p>
                <p style="color: white;">Number: <span id="revNumber" style="float: right; font-weight: bold;"></span></p>
                <hr style="border: 0.1px solid #334155; margin: 15px 0;">
                <h3 style="text-align: center; color: #10b981; font-size: 22px;">Total: <span id="revTotal"></span></h3>
            </div>
            
            <button id="submitBtn" onclick="finalSubmit()" style="width: 100%; margin-top: 20px; padding: 15px; background: #10b981; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">Confirm & Submit ✓</button>
            <p onclick="goBack(2)" style="text-align: center; margin-top: 15px; cursor: pointer; color: #94a3b8;">Edit Details</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
