<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIVA + NS BUYER ZONE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div id="step1" class="page active">
            <h2 style="text-align: center;">Coin Market</h2>
            <div class="coin-card" onclick="openSellForm('Niva Coin', 2.7, 20000, 'niva_buyer_zone_1')">
                <h3>Niva Coin Close-up</h3>
                <p>User Rate: 2.7৳ (1k)</p>
                <p>Min: 20,000</p>
            </div>
            <div class="coin-card" onclick="openSellForm('Ns coin', 10.5, 10000, 'ns_buy_user')">
                <h3>Ns coin</h3>
                <p>User Rate: 10.5৳ (1k)</p>
                <p>Min: 10,000</p>
            </div>
        </div>

        <div id="step2" class="page">
            <h2 id="formTitle">Sell</h2>
            <div class="copy-box">
                <p>Send to ID: <b id="copyTargetId">---</b></p>
                <button onclick="copyId()">COPY</button>
            </div>
            <input type="number" id="coinAmount" placeholder="Enter amount">
            <input type="text" id="senderUsername" placeholder="Sender Username">
            <select id="paymentMethod">
                <option value="Bkash">Bkash</option>
                <option value="Nagad">Nagad</option>
                <option value="Rocket">Rocket</option>
            </select>
            <input type="text" id="walletNumber" placeholder="Number">
            <button class="main-btn" onclick="showReview()">Next Step →</button>
        </div>

        <div id="step3" class="page">
            <h2>Review Details</h2>
            <div class="review-list">
                <p>Coin: <span id="revCoin"></span></p>
                <p>Amount: <span id="revAmount"></span></p>
                <p>Sender: <span id="revSender"></span></p>
                <p>Method: <span id="revMethod"></span></p>
                <p>Number: <span id="revNumber"></span></p>
                <hr>
                <h3 style="color: #10b981;">Total: <span id="revTotal"></span></h3>
            </div>
            <button class="main-btn" id="submitBtn" onclick="finalSubmit()">Confirm & Submit ✓</button>
            <p onclick="goBack(1)" style="text-align: center; cursor: pointer;">Cancel</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
