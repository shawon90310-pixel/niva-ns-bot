<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Market</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0e14;
            color: white;
            padding: 15px;
        }

        .header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            padding-left: 5px;
        }

        /* Card Style */
        .card {
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            border: 1px solid #21262d;
            overflow: hidden;
        }

        /* Status Badge */
        .status {
            position: absolute;
            top: 0;
            right: 0;
            padding: 8px 25px;
            font-size: 12px;
            font-weight: bold;
            border-bottom-left-radius: 20px;
            text-transform: uppercase;
        }

        .online { background-color: #10b981; color: white; }
        .offline { background-color: #443434; color: #f87171; }

        .coin-info {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .coin-icon {
            width: 50px;
            height: 50px;
            background: #2d333b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 24px;
        }

        .coin-name h2 { font-size: 18px; margin-bottom: 2px; }
        .coin-name p { font-size: 12px; color: #8b949e; font-weight: bold; }

        /* Rates Section */
        .rates-container {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .rate-box {
            flex: 1;
            text-align: center;
            background: #0d1117;
            padding: 10px;
            border-radius: 15px;
        }

        .rate-label { font-size: 11px; color: #8b949e; margin-bottom: 8px; font-weight: bold; }

        .rate-value {
            padding: 8px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 16px;
        }

        .user-bg { background: #2563eb; color: white; }
        .admin-bg { background: #059669; color: white; }
        .offline-bg { background: #3c414a; color: #8b949e; }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #58a6ff;
            line-height: 1.6;
            font-weight: 500;
        }

        /* Navigation Bar */
        .navbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: #161b22;
            padding: 15px;
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            border: 1px solid #30363d;
        }

        .nav-item { font-size: 20px; color: #8b949e; cursor: pointer; }
        .active { color: #58a6ff; }
    </style>
</head>
<body>

    <div class="header">Coin Market</div>

    <div class="card">
        <div class="status online">• ONLINE</div>
        <div class="coin-info">
            <div class="coin-icon">🟡</div>
            <div class="coin-name">
                <h2>Niva Coin</h2>
                <p>LIVE MARKET RATE</p>
            </div>
        </div>
        <div class="rates-container">
            <div class="rate-box">
                <div class="rate-label">User Rate</div>
                <div class="rate-value user-bg">2.2৳</div>
            </div>
            <div class="rate-box">
                <div class="rate-label">Admin Rate</div>
                <div class="rate-value admin-bg">2.3৳</div>
            </div>
        </div>
        <div class="footer-text">
            Min Submit: 10,000 • Admin Rate From: 1,000,000 <br> • TAP TO SELL
        </div>
    </div>

    <div class="card" style="opacity: 0.8;">
        <div class="status offline">• OFFLINE</div>
        <div class="coin-info">
            <div class="coin-icon">🔘</div>
            <div class="coin-name">
                <h2>Ns coin</h2>
                <p>LIVE MARKET RATE</p>
            </div>
        </div>
        <div class="rates-container">
            <div class="rate-box">
                <div class="rate-label">User Rate</div>
                <div class="rate-value offline-bg">10.0৳</div>
            </div>
            <div class="rate-box">
                <div class="rate-label">Admin Rate</div>
                <div class="rate-value offline-bg">10.2৳</div>
            </div>
        </div>
        <div class="footer-text">
            Min Submit: 5,000 • Admin Rate From: 100,000 <br> • TAP TO SELL
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item active">🏠</div>
        <div class="nav-item">🕒</div>
        <div class="nav-item">🏆</div>
        <div class="nav-item">🎬</div>
    </div>

</body>
</html>
