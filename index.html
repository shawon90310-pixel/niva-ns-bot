<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS + Niva BUYER ZONE</title>
    <style>
        body {
            background-color: #0b1426;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h2 {
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .coin-card {
            background-color: #16243d;
            border-radius: 15px;
            padding: 20px;
            margin: 0 auto 20px auto;
            max-width: 900px;
            text-align: left;
            position: relative;
            border: 1px solid #233554;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #28a745;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-badge.offline {
            background-color: #dc3545;
        }

        .coin-title {
            font-size: 22px;
            font-weight: bold;
            margin: 0;
        }

        .live-market {
            font-size: 12px;
            color: #8899af;
            margin-bottom: 15px;
        }

        .rate-container {
            display: flex;
            gap: 15px;
            justify-content: space-between;
        }

        .rate-box {
            flex: 1;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .user-rate { background-color: #2563eb; }
        .admin-rate { background-color: #10b981; }

        .rate-label { font-size: 14px; opacity: 0.8; }
        .rate-value { font-size: 24px; font-weight: bold; margin-top: 5px; }

        .min-info {
            text-align: center;
            font-size: 12px;
            color: #3b82f6;
            margin-top: 15px;
        }

        .sell-btn {
            display: block;
            text-align: center;
            color: #3b82f6;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            margin-top: 5px;
            cursor: pointer;
        }

        .sell-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h2>NS + Niva BUYER ZONE</h2>

    <div class="coin-card">
        <span class="status-badge">• ONLINE</span>
        <p class="coin-title">Niva Coin</p>
        <p class="live-market">LIVE MARKET RATE</p>
        
        <div class="rate-container">
            <div class="rate-box user-rate">
                <div class="rate-label">User Rate</div>
                <div class="rate-value">2.2৳</div>
            </div>
            <div class="rate-box admin-rate">
                <div class="rate-label">Admin Rate</div>
                <div class="rate-value">2.3৳</div>
            </div>
        </div>
        
        <p class="min-info">Min Submit: 10,000 • Admin Rate From: 1,000,000</p>
        <a class="sell-btn" onclick="openSellForm('Niva Coin', 2.2, 10000, 'NIVA_ID_HERE')">• TAP TO SELL</a>
    </div>

    <div class="coin-card">
        <span class="status-badge">• ONLINE</span>
        <p class="coin-title">Ns coin</p>
        <p class="live-market">LIVE MARKET RATE</p>
        
        <div class="rate-container">
            <div class="rate-box user-rate">
                <div class="rate-label">User Rate</div>
                <div class="rate-value">10.0৳</div>
            </div>
            <div class="rate-box admin-rate">
                <div class="rate-label">Admin Rate</div>
                <div class="rate-value">10.2৳</div>
            </div>
        </div>
        
        <p class="min-info">Min Submit: 5,000 • Admin Rate From: 100,000</p>
        <a class="sell-btn" onclick="openSellForm('Ns coin', 10.0, 5000, 'NS_ID_HERE')">• TAP TO SELL</a>
    </div>

</body>
</html>
