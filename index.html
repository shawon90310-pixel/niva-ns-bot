<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS + Niva BUYER ZONE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; margin: 0; padding: 20px; color: white; }
        .page { display: none; }
        .active { display: block; }
        .header-title { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 30px; }
        .coin-card { background: #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 20px; position: relative; cursor: pointer; }
        .online-badge { position: absolute; top: 15px; right: 15px; background: #10b981; color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .coin-name { font-size: 20px; font-weight: bold; margin: 0; }
        .live-text { color: #94a3b8; font-size: 12px; margin: 5px 0 20px 0; letter-spacing: 1px; }
        .rate-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .rate-box { flex: 1; padding: 15px; border-radius: 15px; text-align: center; }
        .user-box { background: #2563eb; }
        .admin-box { background: #10b981; }
        .ns-rate-box { background: #334155; }
        .rate-label { font-size: 13px; opacity: 0.9; margin-bottom: 5px; }
        .rate-value { font-size: 18px; font-weight: bold; }
        .footer-info { text-align: center; color: #3b82f6; font-size: 11px; margin-bottom: 8px; }
        .tap-btn { text-align: center; color: #3b82f6; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        
        /* Form Styles */
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        button { background: #3b82f6; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div id="step1" class="page active">
        <div class="header-title">NS + Niva BUYER ZONE</div>

        <div class="coin-card" onclick="openSellForm('Niva Coin', 2.2, 10000)">
            <span class="online-badge">• ONLINE</span>
            <p class="coin-name">Niva Coin</p>
            <p class="live-text">LIVE MARKET RATE</p>
            <div class="rate-container">
                <div class="rate-box user-box">
                    <div class="rate-label">User Rate</div>
                    <div class="rate-value">2.2৳</div>
                </div>
                <div class="rate-box admin-box">
                    <div class="rate-label">Admin Rate</div>
                    <div class="rate-value">2.3৳</div>
                </div>
            </div>
            <div class="footer-info">Min Submit: 10,000 • Admin Rate From: 1,000,000</div>
            <div class="tap-btn">• TAP TO SELL</div>
        </div>

        <div class="coin-card" onclick="openSellForm('Ns coin', 10, 5000)">
            <span class="online-badge">• ONLINE</span>
            <p class="coin-name">Ns coin</p>
            <p class="live-text">LIVE MARKET RATE</p>
            <div class="rate-container">
                <div class="rate-box ns-rate-box">
                    <div class="rate-label">User Rate</div>
                    <div class="rate-value">10.0৳</div>
                </div>
                <div class="rate-box ns-rate-box">
                    <div class="rate-label">Admin Rate</div>
                    <div class="rate-value">10.2৳</div>
                </div>
            </div>
            <div class="footer-info">Min Submit: 5,000 • Admin Rate From: 100,000</div>
            <div class="tap-btn">• TAP TO SELL</div>
        </div>
    </div>

    <div id="step2" class="page">
        <h2 id="formTitle" style="text-align: center;">Sell</h2>
        <input type="number" id="coinAmount" placeholder="Enter amount">
        <input type="text" id="senderUsername" placeholder="Sender Username">
        <select id="paymentMethod">
            <option value="Nagad">Nagad</option>
            <option value="Bkash">Bkash</option>
        </select>
        <input type="text" id="paymentNumber" placeholder="Payment Number">
        <button id="submitBtn" onclick="submitOrder()">Confirm & Submit ✓</button>
        <button onclick="showPage(1)" style="background: #475569;">Back</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
